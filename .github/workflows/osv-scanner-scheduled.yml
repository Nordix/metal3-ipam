# runs vulnerability scans and add them to Github Security tab

name: OSV-Scanner Scan

on:
  workflow_dispatch:
  schedule:
  - cron: "12 6 * * *"
  pull_request:
    paths:
    - ".github/workflows/osv-scanner-scan.yml"

permissions:
  actions: read
  contents: read
  security-events: write # for uploading SARIF files

jobs:
  set-go-version:
    name: Set up Go version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Calculate go version
      id: vars
      run: echo "go_version=$(make go-version)" >> "${GITHUB_OUTPUT}"
    - name: Set up Go
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
      with:
        go-version: ${{ steps.vars.outputs.go_version }}
    - name: Create config.toml
      run: echo "GoVersionOverride = \"${{ steps.vars.outputs.go_version }}\"" > config.toml
    - name: Upload config.toml
      uses: actions/upload-artifact@v4
      with:
        name: calculated-go-version
        path: ./config.toml
  scan-scheduled:
    name: Run OSV Scanner
    needs: set-go-version
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.2.2"
    with:
      download-artifact: calculated-go-version
      scan-args: |-
        --format json --output results.json --recursive
        --config=./config.toml