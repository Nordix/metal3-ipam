- name: metal3
  type: IPAMProvider
  versions:
  - name: "v1.14.99"
    value: "https://github.com/metal3-io/ip-address-manager/releases/download/v1.13.0/ipam-components.yaml"
    type: "url"
    contract: v1beta2
    replacements:
    - old: --metrics-addr=127.0.0.1:8080
      new: --metrics-addr=:8080
    files:
    - sourcePath: "../data/shared/ipam-metal3/v1.14/metadata.yaml"
      targetName: "metadata.yaml"
  - name: "{go://github.com/metal3-io/ip-address-manager@v1.13}"
    value: "https://github.com/metal3-io/ip-address-manager/releases/download/{go://github.com/metal3-io/ip-address-manager@v1.13}/ipam-components.yaml"
    type: "url"
    contract: v1beta2
    replacements:
    - old: --metrics-addr=127.0.0.1:8080
      new: --metrics-addr=:8080
    files:
    - sourcePath: "../data/shared/ipam-metal3/v1.13/metadata.yaml"
