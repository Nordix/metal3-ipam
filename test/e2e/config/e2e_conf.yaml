# E2E test scenario using local dev images and manifests built from the source tree for following providers:
# - cluster-api
# - bootstrap kubeadm
# - control-plane kubeadm
# - metal3

images:
# Use local dev images built source tree;
- name: quay.io/metal3-io/cluster-api-provider-metal3:latest
  loadBehavior: mustLoad
- name: quay.io/metal3-io/baremetal-operator:latest
  loadBehavior: mustLoad
- name: quay.io/metal3-io/ip-address-manager:latest
  loadBehavior: mustLoad

providers:
- name: cluster-api
  type: CoreProvider
  versions:
  - name: "{go://sigs.k8s.io/cluster-api@v1.13}"
    value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/{go://sigs.k8s.io/cluster-api@v1.13}/core-components.yaml"
    type: "url"
    contract: v1beta2
    replacements:
    - old: --metrics-addr=127.0.0.1:8080
      new: --metrics-addr=:8080
    files:
    - sourcePath: "../data/shared/capi/v1.13/metadata.yaml"
  - name: v1.13.0
    value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.13.0/core-components.yaml"
    type: "url"
    contract: v1beta2
    replacements:
    - old: --metrics-addr=127.0.0.1:8080
      new: --metrics-addr=:8080
    files:
    - sourcePath: "../data/shared/capi/v1.13/metadata.yaml"
  - name: "{go://sigs.k8s.io/cluster-api@v1.12}"
    value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/{go://sigs.k8s.io/cluster-api@v1.12}/core-components.yaml"
